<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a4f6e"/>
<title>Marina Repair</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f7ff;--surface:#fff;--surface2:#e8f3fc;--surface3:#ddeef8;
  --primary:#0a4f6e;--accent:#00b4d8;--accent2:#0096c7;
  --text:#0d2d3e;--text2:#3a6a7e;--text3:#7aaabb;
  --border:#cce4f0;--shadow:rgba(10,79,110,.12);
  --success:#2da84f;--warn:#e07b39;--danger:#d64045;--info:#7c6fcd;
  --nav-h:68px;--hdr-h:56px;--safe-bottom:env(safe-area-inset-bottom,0px);
  --r:14px;--r2:10px;--r3:8px;
}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased}
/* THEME CLASSES */
.theme-deep-water.dark{
  --bg:#061a24;--surface:#0d2d3e;--surface2:#0f3548;--surface3:#163d52;
  --primary:#00b4d8;--accent:#48cae4;--accent2:#90e0ef;
  --text:#caf0f8;--text2:#6a9dad;--text3:#3a6e7e;
  --border:#143d52;--shadow:rgba(0,180,216,.08);
}
.theme-sunset-harbour.light{
  --bg:#fff8f0;--surface:#fff;--surface2:#fef3e8;--surface3:#fde6d0;
  --primary:#b5440e;--accent:#e87e3e;--accent2:#d06030;
  --text:#3d1a06;--text2:#8a5a3a;--text3:#bb8060;
  --border:#f0d5be;--shadow:rgba(181,68,14,.1);
}
.theme-sunset-harbour.dark{
  --bg:#1a0a02;--surface:#2d1508;--surface2:#3d2010;--surface3:#4d2818;
  --primary:#e87e3e;--accent:#f4a261;--accent2:#ffb380;
  --text:#fde8d0;--text2:#aa7055;--text3:#6a4030;
  --border:#4d2f18;--shadow:rgba(232,126,62,.08);
}
.theme-storm-watch.light{
  --bg:#f2f5f3;--surface:#fff;--surface2:#e8ede9;--surface3:#dce4dd;
  --primary:#2d4a3e;--accent:#52b788;--accent2:#40946c;
  --text:#1a2e26;--text2:#4a6a5a;--text3:#7a9a88;
  --border:#c8dbd0;--shadow:rgba(45,74,62,.1);
}
.theme-storm-watch.dark{
  --bg:#0a1510;--surface:#152018;--surface2:#1e2e23;--surface3:#253828;
  --primary:#52b788;--accent:#74c69d;--accent2:#95d9b8;
  --text:#d8f3dc;--text2:#4a8a68;--text3:#2a5a40;
  --border:#1e3828;--shadow:rgba(82,183,136,.08);
}
.theme-coral-bay.light{
  --bg:#fff5f2;--surface:#fff;--surface2:#ffeee8;--surface3:#ffe0d8;
  --primary:#c03a3a;--accent:#06b88a;--accent2:#059970;
  --text:#2d0a0a;--text2:#8a4a4a;--text3:#bb8080;
  --border:#f0d0c8;--shadow:rgba(192,58,58,.1);
}
.theme-coral-bay.dark{
  --bg:#0f0505;--surface:#200c0c;--surface2:#2d1010;--surface3:#3a1818;
  --primary:#06b88a;--accent:#ff7b7b;--accent2:#ff9898;
  --text:#ffe0e0;--text2:#9a5050;--text3:#5a2828;
  --border:#3d1818;--shadow:rgba(6,184,138,.08);
}
/* LAYOUT */
.app-shell{display:flex;flex-direction:column;height:100%;height:100dvh;overflow:hidden}
.header{display:flex;align-items:center;padding:0 12px;height:var(--hdr-h);background:var(--primary);gap:10px;flex-shrink:0;padding-top:env(safe-area-inset-top,0)}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:11px;color:rgba(255,255,255,.65);font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.5px;margin-top:-2px}
.header-btn{width:40px;height:40px;border:none;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;font-size:18px;flex-shrink:0;transition:background .15s}
.header-btn:active{background:rgba(255,255,255,.25)}
.screen-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg);padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px)}
.screen-body.no-nav{padding-bottom:calc(var(--safe-bottom) + 16px)}
.bottom-nav{display:flex;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);flex-shrink:0;position:relative;z-index:10}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--text3);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:0;transition:color .15s}
.nav-item.active{color:var(--primary)}
.nav-item svg{width:22px;height:22px}
.nav-fab{position:absolute;top:-22px;left:50%;transform:translateX(-50%);width:52px;height:52px;background:var(--accent);border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 16px var(--shadow);transition:transform .15s,background .15s}
.nav-fab:active{transform:translateX(-50%) scale(.93)}
/* CARDS */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.card-pad{padding:14px 16px}
.section-head{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;color:var(--text2);padding:18px 16px 8px;text-transform:uppercase}
/* JOB CARDS */
.job-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);display:flex;align-items:stretch;overflow:hidden;margin:0 12px 10px;box-shadow:0 2px 8px var(--shadow);position:relative;active-scale:.98;transition:transform .1s}
.job-card:active{transform:scale(.98)}
.job-card-stripe{width:5px;flex-shrink:0}
.job-card-body{flex:1;padding:12px 14px;min-width:0}
.job-card-boat{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.job-card-owner{font-size:13px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.job-card-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.job-card-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;padding:12px 14px;gap:6px;flex-shrink:0}
.job-card-wo{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px}
/* TOGGLE CHIPS */
.chip-grid{display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 12px}
.chip{border:1.5px solid var(--border);border-radius:20px;padding:6px 13px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--text2);background:var(--surface2);cursor:pointer;transition:all .15s;white-space:nowrap;text-transform:uppercase}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.on.green{background:var(--success);border-color:var(--success)}
.chip.on.warn{background:var(--warn);border-color:var(--warn)}
.chip.on.danger{background:var(--danger);border-color:var(--danger)}
.chip.on.purple{background:var(--info);border-color:var(--info)}
.chip:active{transform:scale(.95)}
/* STATUS BADGES */
.status-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}
/* STATUS PIPELINE */
.pipeline{display:flex;overflow-x:auto;padding:12px 16px;gap:6px;scrollbar-width:none}
.pipeline::-webkit-scrollbar{display:none}
.pipe-step{flex-shrink:0;padding:7px 14px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;border:2px solid;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.pipe-step:active{transform:scale(.95)}
/* TABS */
.tabs{display:flex;padding:0 12px;gap:4px;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:12px 16px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .15s;text-transform:uppercase}
.tab.active{color:var(--primary);border-bottom-color:var(--accent)}
/* FORMS */
.field{padding:0 16px 14px}
.field label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.8px;color:var(--text2);text-transform:uppercase;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r3);padding:11px 13px;font-family:'Barlow',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border .15s;-webkit-appearance:none;appearance:none}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--r3);padding:13px 20px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:all .15s;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text2)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-sm{padding:9px 16px;font-size:13px}
.btn-icon{width:40px;height:40px;padding:0;border-radius:var(--r3);flex-shrink:0}
/* RATING ROW */
.rating-row{display:flex;gap:5px}
.rating-btn{flex:1;padding:8px 0;border:1.5px solid var(--border);border-radius:var(--r3);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--text2);background:var(--surface2);cursor:pointer;text-align:center;transition:all .15s;text-transform:uppercase}
.rating-btn.sel-good{background:#2da84f;border-color:#2da84f;color:#fff}
.rating-btn.sel-fair{background:#e8b42e;border-color:#e8b42e;color:#fff}
.rating-btn.sel-poor{background:#d64045;border-color:#d64045;color:#fff}
.rating-btn.sel-na{background:var(--text3);border-color:var(--text3);color:#fff}
/* LOGIN */
.pin-display{display:flex;gap:12px;justify-content:center;margin:20px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--border);transition:all .2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto}
.pin-key{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:0;height:72px;font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.pin-key:active{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(.94)}
.pin-key.del{font-family:'Barlow',sans-serif;font-size:22px}
/* CHECKLIST */
.check-item{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;min-height:52px}
.check-item:active{background:var(--surface2)}
.check-box{width:52px;height:52px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check-circle{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--surface2)}
.check-circle.done{background:var(--success);border-color:var(--success)}
.check-label{flex:1;padding:12px 16px 12px 0;font-size:14px;line-height:1.35}
.check-label.done{color:var(--text3);text-decoration:line-through}
.check-cat{padding:10px 16px 4px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border)}
/* WORK LOG */
.log-entry{padding:14px 16px;border-bottom:1px solid var(--border)}
.log-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.log-avatar{width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:#fff;flex-shrink:0;letter-spacing:.5px}
.log-date{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}
.log-desc{font-size:14px;color:var(--text);line-height:1.5;white-space:pre-wrap}
.log-parts{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.part-tag{padding:3px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-weight:600}
/* PHOTO GRID */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px}
.photo-thumb{aspect-ratio:4/3;border-radius:var(--r3);overflow:hidden;background:var(--surface2);position:relative;cursor:pointer}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-type-badge{position:absolute;top:6px;left:6px;padding:2px 7px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:rgba(0,0,0,.5);color:#fff;backdrop-filter:blur(4px)}
/* SEARCH */
.search-bar{margin:12px 12px 4px;position:relative}
.search-bar input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 14px 11px 42px;font-family:'Barlow',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border .15s}
.search-bar input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:17px;pointer-events:none}
/* THEME PICKER */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px}
.theme-card{border-radius:var(--r);border:2px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s}
.theme-card.selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,180,216,.2)}
.theme-preview{height:60px;position:relative;overflow:hidden}
.theme-meta{padding:10px 12px;background:var(--surface)}
.theme-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--text);margin-bottom:6px}
.day-night-toggle{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.dnt-btn{flex:1;padding:5px 0;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;border:none;background:var(--surface2);color:var(--text3);cursor:pointer;transition:all .15s;text-transform:uppercase}
.dnt-btn.active{background:var(--primary);color:#fff}
/* EMPLOYEE CARD */
.emp-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
.emp-avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;flex-shrink:0}
.emp-info{flex:1;min-width:0}
.emp-name{font-size:15px;font-weight:600;color:var(--text)}
.emp-role{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;margin-top:1px}
/* MISC */
.divider{height:1px;background:var(--border);margin:4px 0}
.empty-state{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--text2);margin-bottom:6px}
.empty-msg{font-size:14px;line-height:1.5}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 10px);left:50%;transform:translateX(-50%);background:#1a2e3e;color:#fff;padding:10px 18px;border-radius:30px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;z-index:1000;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:toastIn .25s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.fab-area{padding:0 16px 10px}
.inline-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;border:1.5px solid}
.voice-btn{display:flex;align-items:center;gap:8px;padding:11px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r3);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;color:var(--text2);text-transform:uppercase;transition:all .15s;width:100%}
.voice-btn.recording{background:rgba(214,64,69,.1);border-color:var(--danger);color:var(--danger)}
.recording-pulse{width:10px;height:10px;border-radius:50%;background:var(--danger);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
.shimmer{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
.banner{padding:8px 16px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.sticky-top{position:sticky;top:0;z-index:5;background:var(--bg)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;padding-bottom:var(--safe-bottom)}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:80dvh;overflow-y:auto;padding-bottom:8px}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--text);padding:14px 20px 10px}
img{max-width:100%;display:block}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const STATUS_CONFIG = {
  intake:          { label:'INTAKE',        color:'#7c6fcd', bg:'rgba(124,111,205,.15)', stripe:'#7c6fcd' },
  fall_checklist:  { label:'FALL CHECK',    color:'#e07b39', bg:'rgba(224,123,57,.15)',  stripe:'#e07b39' },
  storage:         { label:'IN STORAGE',    color:'#5b9bd5', bg:'rgba(91,155,213,.15)',  stripe:'#5b9bd5' },
  spring_checklist:{ label:'SPRING CHECK',  color:'#52b788', bg:'rgba(82,183,136,.15)',  stripe:'#52b788' },
  ready:           { label:'READY',         color:'#2da84f', bg:'rgba(45,168,79,.15)',   stripe:'#2da84f' },
  invoiced:        { label:'INVOICED',      color:'#e8b42e', bg:'rgba(232,180,46,.15)',  stripe:'#e8b42e' },
  archived:        { label:'ARCHIVED',      color:'#888',    bg:'rgba(136,136,136,.15)', stripe:'#888'    },
};
const STATUS_ORDER = Object.keys(STATUS_CONFIG);

const THEMES = [
  { id:'deep-water',      name:'Deep Water',     icon:'🌊', desc:'Classic nautical' },
  { id:'sunset-harbour',  name:'Sunset Harbour', icon:'🌅', desc:'Warm & golden' },
  { id:'storm-watch',     name:'Storm Watch',    icon:'⛈️', desc:'Rugged & green' },
  { id:'coral-bay',       name:'Coral Bay',      icon:'🐠', desc:'Bright & tropical' },

// ─── API ──────────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('marina_token') || ''; }

async function api(method, path, body, isFormData) {
  const opts = {
    method,
    headers: { 'Authorization': `Bearer ${getToken()}` },
  };
  if (body && !isFormData) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  } else if (isFormData) {
    opts.body = body;
  }
  const res = await fetch(`/api${path}`, opts);
  if (res.status === 401) {
    localStorage.removeItem('marina_token');
    localStorage.removeItem('marina_employee');
    window.location.reload();
    return;
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Server error' }));
    throw new Error(err.error || 'Request failed');
  }
  return res.json();
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function ToastProvider({ children }) {
  const [toast, setToast] = useState(null);
  const timerRef = useRef(null);
  const showToast = useCallback((msg, duration=2200) => {
    clearTimeout(timerRef.current);
    setToast(msg);
    timerRef.current = setTimeout(() => setToast(null), duration);
  }, []);
  return (
    <ToastCtx.Provider value={showToast}>
      {children}
      {toast && <div className="toast">{toast}</div>}
    </ToastCtx.Provider>
  );
}

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const addDigit = async (d) => {
    if (loading) return;
    const newPin = pin + d;
    setPin(newPin);
    setError('');
    if (newPin.length === 4) {
      setLoading(true);
      try {
        const data = await api('POST', '/auth/login', { pin: newPin });
        localStorage.setItem('marina_token', data.token);
        localStorage.setItem('marina_employee', JSON.stringify(data.employee));
        onLogin(data.employee);
      } catch (e) {
        setError('Wrong PIN');
        setPin('');
      } finally {
        setLoading(false);
      }
    }
  };

  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];

  return (
    <div style={{
      minHeight:'100dvh', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      background:'var(--bg)', padding:'24px',
    }}>
      <div style={{ textAlign:'center', marginBottom:40 }}>
        <div style={{ fontSize:48, marginBottom:12 }}>⚓</div>
        <div style={{ fontFamily:'Bebas Neue', fontSize:32, letterSpacing:3, color:'var(--primary)' }}>
          MARINA REPAIR
        </div>
        <div style={{ fontFamily:'Barlow Condensed', fontSize:13, fontWeight:600, letterSpacing:1, color:'var(--text3)', textTransform:'uppercase', marginTop:4 }}>
          Enter your PIN
        </div>
      </div>

      <div className="pin-display">
        {[0,1,2,3].map(i => (
          <div key={i} className={`pin-dot ${i < pin.length ? 'filled' : ''}`}/>
        ))}
      </div>

      {error && (
        <div style={{ color:'var(--danger)', fontFamily:'Barlow Condensed', fontWeight:700, fontSize:14, letterSpacing:.5, marginBottom:10, textTransform:'uppercase' }}>
          {error}
        </div>
      )}

      <div className="pin-grid" style={{ marginTop:10, width:'100%', maxWidth:280 }}>
        {keys.map((k, i) => (
          <button
            key={i}
            className={`pin-key ${k === '⌫' ? 'del' : ''}`}
            style={{ visibility: k === '' ? 'hidden' : 'visible', opacity: loading ? .5 : 1 }}
            onClick={() => k === '⌫' ? setPin(p => p.slice(0,-1)) : k && addDigit(k)}
          >
            {k}
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── CARD DETAIL SCREEN ───────────────────────────────────────────────────────
function CardDetailScreen({ params = {} }) {
  const { navigate, goBack } = useContext(NavCtx);
  const { employee } = useContext(AuthCtx);
  const showToast = useContext(ToastCtx);
  const [card, setCard] = useState(null);
  const [tab, setTab] = useState('info');
  const [saving, setSaving] = useState(false);

  const reload = useCallback(() => {
    api('GET', `/cards/${params.id}`).then(setCard).catch(() => {});
  }, [params.id]);

  useEffect(() => { reload(); }, [reload]);

  const advanceStatus = async () => {
    const idx = STATUS_ORDER.indexOf(card.status);
    if (idx < STATUS_ORDER.length - 1) {
      const next = STATUS_ORDER[idx + 1];
      setSaving(true);
      try {
        await api('PUT', `/cards/${card.id}`, { status: next });
        showToast(`Status → ${STATUS_CONFIG[next].label}`);
        reload();
      } catch(e) { showToast('Failed to update'); }
      setSaving(false);
    }
  };

  if (!card) return (
    <div style={{ padding:20 }}>
      <div className="shimmer" style={{ height:200, borderRadius:'var(--r)' }}/>
    </div>
  );

  const cfg = STATUS_CONFIG[card.status];
  const nextStatus = STATUS_ORDER[STATUS_ORDER.indexOf(card.status) + 1];
  const tabs = [
    { key:'info', label:'Info' },
    { key:'work', label:'Authorized' },
    { key:'cleaning', label:'Cleaning' },
    { key:'items', label:'Items' },
    { key:'logs', label:'Log' },
    { key:'checklist', label:'Checklist' },
    { key:'photos', label:'Photos' },
  ];

  return (
    <div>
      {/* Card header */}
      <div style={{ background:'var(--primary)', padding:'12px 16px 14px' }}>
        <div style={{ fontFamily:'Bebas Neue', fontSize:26, letterSpacing:1.5, color:'#fff', lineHeight:1 }}>
          {card.boat_name || '(no name)'}
        </div>
        <div style={{ color:'rgba(255,255,255,.7)', fontSize:13, margin:'3px 0 10px', fontFamily:'Barlow Condensed', fontWeight:600, letterSpacing:.3 }}>
          {card.customer_name} · {card.motor_type || '—'} · {card.licence || '—'}
        </div>
        {/* Status pipeline */}
        <div style={{ display:'flex', gap:5, overflowX:'auto', scrollbarWidth:'none', paddingBottom:2 }}>
          {STATUS_ORDER.slice(0,-1).map((s, i) => {
            const scfg = STATUS_CONFIG[s];
            const past = STATUS_ORDER.indexOf(card.status) > i;
            const current = card.status === s;
            return (
              <div key={s} style={{
                flexShrink:0, padding:'4px 10px', borderRadius:20,
                fontFamily:'Barlow Condensed', fontSize:10, fontWeight:700, letterSpacing:.8,
                textTransform:'uppercase',
                background: current ? '#fff' : past ? 'rgba(255,255,255,.3)' : 'rgba(255,255,255,.1)',
                color: current ? cfg.color : past ? '#fff' : 'rgba(255,255,255,.5)',
                border: current ? 'none' : '1px solid rgba(255,255,255,.2)',
              }}>
                {past && '✓ '}{scfg.label}
              </div>
            );
          })}
        </div>
      </div>

      {/* Next status button */}
      {nextStatus && nextStatus !== 'archived' && (
        <div style={{ padding:'10px 12px 0' }}>
          <button
            className="btn btn-accent"
            onClick={advanceStatus}
            disabled={saving}
            style={{ opacity: saving ? .7 : 1 }}
          >
            <Icon name="check" size={16} color="#fff"/>
            Mark as {STATUS_CONFIG[nextStatus].label}
          </button>
        </div>
      )}

      {/* Tabs */}
      <div className="tabs" style={{ overflowX:'auto', scrollbarWidth:'none' }}>
        {tabs.map(t => (
          <button key={t.key} className={`tab ${tab === t.key ? 'active' : ''}`} onClick={() => setTab(t.key)}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Tab content */}
      {tab === 'info' && <InfoTab card={card} reload={reload}/>}
      {tab === 'work' && <WorkTab card={card} reload={reload}/>}
      {tab === 'cleaning' && <CleaningTab card={card} reload={reload}/>}
      {tab === 'items' && <ItemsTab card={card} reload={reload}/>}
      {tab === 'logs' && <LogsTab card={card} reload={reload}/>}
      {tab === 'checklist' && <ChecklistTab card={card} reload={reload}/>}
      {tab === 'photos' && <PhotosTab card={card} reload={reload}/>}
    </div>
  );
}

function ConditionRatingRow({ area, cardId, initialRating, initialNotes, reload }) {
  const showToast = useContext(ToastCtx);
  const [rating, setRating] = useState(initialRating || '');

  const pick = async (r) => {
    const newR = rating === r ? '' : r;
    setRating(newR);
    try {
      await api('PUT', `/cards/${cardId}/condition`, { condition: [{ area, rating: newR, notes: initialNotes }] });
    } catch(e) { showToast('Save failed'); }
  };

  return (
    <div className="rating-row">
      {['good','fair','poor','n/a'].map(r => (
        <button key={r} className={`rating-btn ${rating === r ? `sel-${r.replace('/','').replace(' ','-')}` : ''}`} onClick={() => pick(r)}>
          {r.toUpperCase()}
        </button>
      ))}
    </div>
  );
}

// WORK AUTHORIZED TAB
function WorkTab({ card, reload }) {
  const showToast = useContext(ToastCtx);
  const [work, setWork] = useState(card.authorized_work || []);

  const toggle = async (key, field) => {
    const updated = work.map(w => w.service_type === key ? { ...w, [field]: w[field] ? 0 : 1 } : w);
    setWork(updated);
    try {
      await api('PUT', `/cards/${card.id}/work`, { work: updated.map(w => ({ ...w, authorized: !!w.authorized, completed: !!w.completed })) });
    } catch(e) { showToast('Save failed'); reload(); }
  };

  return (
    <div>
      <div style={{ padding:'12px 16px 8px', fontFamily:'Barlow Condensed', fontSize:12, fontWeight:700, letterSpacing:.5, color:'var(--text3)', textTransform:'uppercase' }}>
        Tap to authorize · Long-press to mark complete
      </div>
      <div className="card" style={{ margin:'0 12px' }}>
        {AUTHORIZED_WORK.map((w, i) => {
          const entry = work.find(x => x.service_type === w.key) || {};
          const authorized = !!entry.authorized;
          const completed = !!entry.completed;
          return (
            <div key={w.key}
              onClick={() => toggle(w.key, 'authorized')}
              onContextMenu={e => { e.preventDefault(); toggle(w.key, 'completed'); }}
              style={{
                display:'flex', alignItems:'center', padding:'14px 16px',
                borderBottom: i < AUTHORIZED_WORK.length-1 ? '1px solid var(--border)' : 'none',

                transition:'background .15s',
              }}
            >
              <div style={{
                width:28, height:28, borderRadius:8, flexShrink:0, marginRight:12,
                background: completed ? 'var(--success)' : authorized ? 'var(--accent)' : 'var(--surface2)',
                border: `2px solid ${completed ? 'var(--success)' : authorized ? 'var(--accent)' : 'var(--border)'}`,

          const entry = items.find(i => i.item === ri.key) || {};

            <button key={ri.key} className={`chip ${entry.present ? 'on green' : ''}`} onClick={() => toggle(ri.key)}>
              {entry.present ? '✓ ' : ''}{ri.label}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// CHECKLIST TAB
function ChecklistTab({ card, reload }) {
  const showToast = useContext(ToastCtx);
  const season = card.status === 'spring_checklist' || card.status === 'ready' ? 'spring' : 'fall';
  const [activeList, setActiveList] = useState(season);
  const CHECKLISTS = { fall: FALL_CHECKLIST, spring: SPRING_CHECKLIST };
  const existing = card.checklists?.find(c => c.checklist_type === activeList);
  const [items, setItems] = useState(() => {
    try { return JSON.parse(existing?.items_json || '{}'); } catch { return {}; }
  });

  useEffect(() => {
    const ex = card.checklists?.find(c => c.checklist_type === activeList);
    try { setItems(JSON.parse(ex?.items_json || '{}')); } catch { setItems({}); }
  }, [activeList, card.checklists]);

  const toggle = async (key) => {
    const updated = { ...items, [key]: !items[key] };
    setItems(updated);
    try {
      await api('POST', `/cards/${card.id}/checklists`, { checklist_type: activeList, items_json: JSON.stringify(updated) });
    } catch(e) { showToast('Save failed'); }
  };

  const allItems = CHECKLISTS[activeList].flatMap(cat => cat.items);
  const doneCount = allItems.filter(i => items[i.key]).length;

  return (
    <div>
      <div style={{ display:'flex', gap:6, padding:'10px 12px 4px' }}>
        {['fall','spring'].map(t => (
          <button key={t} className={`chip ${activeList === t ? 'on' : ''}`} style={{ textTransform:'capitalize' }} onClick={() => setActiveList(t)}>
            {t === 'fall' ? '🍂' : '🌱'} {t.toUpperCase()}
          </button>
        ))}
        <div style={{ flex:1 }}/>
        <div style={{ fontFamily:'Barlow Condensed', fontSize:13, fontWeight:700, letterSpacing:.5, color: doneCount === allItems.length ? 'var(--success)' : 'var(--text2)', alignSelf:'center' }}>
          {doneCount}/{allItems.length}
        </div>
      </div>

      <div className="card" style={{ margin:'8px 12px' }}>
        {CHECKLISTS[activeList].map(cat => (
          <div key={cat.cat}>
            <div className="check-cat">{cat.cat}</div>
            {cat.items.map(item => (
              <div key={item.key} className="check-item" onClick={() => toggle(item.key)}>
                <div className="check-box">
                  <div className={`check-circle ${items[item.key] ? 'done' : ''}`}>
                    {items[item.key] && <Icon name="check" size={12} color="#fff"/>}
                  </div>
                </div>
                <div className={`check-label ${items[item.key] ? 'done' : ''}`}>{item.label}</div>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// PHOTOS TAB
function PhotosTab({ card, reload }) {
  const showToast = useContext(ToastCtx);
  const { employee } = useContext(AuthCtx);
  const [uploading, setUploading] = useState(false);
  const [photoType, setPhotoType] = useState('before');
  const fileRef = useRef(null);
  const [fullscreen, setFullscreen] = useState(null);

  const upload = async (file) => {
    setUploading(true);
    try {
      const fd = new FormData();
      fd.append('photo', file);
      fd.append('photo_type', photoType);
      const res = await fetch(`/api/cards/${card.id}/photos`, {
        method:'POST',
        headers: { 'Authorization': `Bearer ${getToken()}` },
        body: fd,
      });
      if (!res.ok) throw new Error();
      showToast('Photo uploaded');
      reload();
    } catch(e) { showToast('Upload failed'); }
    setUploading(false);
  };

  const deletePhoto = async (id) => {
    if (!confirm('Delete photo?')) return;
    try { await api('DELETE', `/photos/${id}`); showToast('Deleted'); reload(); }
    catch(e) { showToast('Failed'); }
  };

  const PHOTO_TYPES = ['before','after','damage','general'];

  return (
    <div>
      <div style={{ padding:'10px 12px 6px' }}>
        <div style={{ display:'flex', gap:6, marginBottom:10, flexWrap:'wrap' }}>
          {PHOTO_TYPES.map(t => (
            <button key={t} className={`chip ${photoType === t ? 'on' : ''}`} style={{ textTransform:'capitalize' }} onClick={() => setPhotoType(t)}>
              {t}
            </button>
          ))}
        </div>
        <button
          className={`btn ${uploading ? 'btn-outline' : 'btn-accent'}`}
          onClick={() => fileRef.current?.click()}
          disabled={uploading}
        >
          <Icon name="camera" size={16} color={uploading ? 'var(--text2)' : '#fff'}/>
          {uploading ? 'Uploading...' : `Add ${photoType.charAt(0).toUpperCase()+photoType.slice(1)} Photo`}
        </button>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display:'none' }} onChange={e => e.target.files[0] && upload(e.target.files[0])}/>
      </div>

      {(!card.photos || card.photos.length === 0) ? (
        <div className="empty-state">
          <div className="empty-icon">📷</div>
          <div className="empty-title">No Photos Yet</div>
          <div className="empty-msg">Capture before & after photos</div>
        </div>
      ) : (
        <div className="photo-grid">
          {card.photos.map(p => (
            <div key={p.id} className="photo-thumb" onClick={() => setFullscreen(p)}>
              <img src={`/photos/${p.filename}`} alt={p.caption || p.photo_type}/>
              <div className="photo-type-badge">{p.photo_type}</div>

          ))}
        </div>

      {fullscreen && (
        <div className="modal-overlay" onClick={() => setFullscreen(null)} style={{ alignItems:'center', justifyContent:'center', padding:16 }}>
          <div onClick={e => e.stopPropagation()} style={{ background:'#000', borderRadius:12, overflow:'hidden', maxWidth:'100%', maxHeight:'80dvh', position:'relative' }}>
            <img src={`/photos/${fullscreen.filename}`} style={{ width:'100%', display:'block' }} alt=""/>
            <div style={{ display:'flex', justifyContent:'space-between', padding:'10px 14px', background:'rgba(0,0,0,.8)' }}>
              <span style={{ color:'#fff', fontFamily:'Barlow Condensed', fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.5 }}>{fullscreen.photo_type}</span>
              <button onClick={() => { deletePhoto(fullscreen.id); setFullscreen(null); }} style={{ background:'rgba(214,64,69,.8)', border:'none', color:'#fff', borderRadius:8, padding:'4px 10px', fontFamily:'Barlow Condensed', fontWeight:700, fontSize:12, cursor:'pointer', letterSpacing:.5, textTransform:'uppercase' }}>

// ─── NEW WORK LOG SCREEN ──────────────────────────────────────────────────────
function NewLogScreen({ params = {} }) {
  const { goBack } = useContext(NavCtx);
  const { employee } = useContext(AuthCtx);
  const showToast = useContext(ToastCtx);
  const [form, setForm] = useState({ description: '', log_date: new Date().toISOString().split('T')[0] });
  const [parts, setParts] = useState([]);
  const [recording, setRecording] = useState(false);
  const [transcript, setTranscript] = useState('');
  const recognitionRef = useRef(null);
  const [saving, setSaving] = useState(false);

  const startRecording = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast('Voice not supported in this browser'); return; }
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = 'en-CA';
    r.onresult = e => {
      const t = Array.from(e.results).map(r => r[0].transcript).join(' ');
      setTranscript(t);
    };
    r.onerror = () => { setRecording(false); showToast('Mic error'); };
    r.onend = () => setRecording(false);
    r.start();
    recognitionRef.current = r;
    setRecording(true);
  };

  const stopRecording = () => {
    recognitionRef.current?.stop();
    setRecording(false);
    if (transcript) setForm(f => ({ ...f, description: f.description ? f.description + '\n' + transcript : transcript }));
    setTranscript('');
  };

  const addPart = () => setParts(p => [...p, { part_number:'', description:'', quantity:1 }]);
  const updatePart = (i, field, val) => setParts(p => p.map((x, j) => j === i ? { ...x, [field]: val } : x));
  const removePart = (i) => setParts(p => p.filter((_, j) => j !== i));

  const save = async () => {
    if (!form.description && !transcript) { showToast('Add some notes first'); return; }
    setSaving(true);
    try {
      await api('POST', `/cards/${params.cardId}/logs`, {
        log_date: form.log_date,
        description: form.description || transcript,
        parts: parts.filter(p => p.description),
      });
      showToast('Log entry saved');
      goBack();
    } catch(e) { showToast('Save failed'); }
    setSaving(false);
  };

  return (
    <div>
      <div className="field" style={{ paddingTop:16 }}>
        <label>Date</label>
        <input type="date" value={form.log_date} onChange={e => setForm({...form, log_date: e.target.value})}/>
      </div>

      <div className="field">
        <label>Work Notes</label>
        <textarea
          placeholder="Describe work performed..."
          value={form.description}
          onChange={e => setForm({...form, description: e.target.value})}
          style={{ minHeight:100 }}
        />
      </div>

      <div className="field">
        <button className={`voice-btn ${recording ? 'recording' : ''}`} onClick={recording ? stopRecording : startRecording}>
          {recording ? <div className="recording-pulse"/> : <Icon name="mic" size={18} color="var(--text2)"/>}
          {recording ? 'Tap to Stop Recording' : 'Voice Note (tap to record)'}
        </button>
        {transcript && (
          <div style={{ marginTop:8, padding:'10px 12px', background:'var(--surface2)', borderRadius:'var(--r3)', fontSize:13, color:'var(--text2)', fontStyle:'italic' }}>
            🎙️ {transcript}
          </div>
        )}
      </div>

      <div className="section-head" style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingRight:16 }}>
        <span>Parts Used</span>
        <button className="btn btn-outline btn-sm" style={{ width:'auto', padding:'5px 12px' }} onClick={addPart}>+ Add</button>
      </div>

      {parts.map((p, i) => (
        <div key={i} style={{ padding:'0 16px 10px', display:'flex', gap:8, alignItems:'flex-start' }}>
          <div style={{ flex:1 }}>
            <input
              placeholder="Part # (optional)"
              style={{ width:'100%', background:'var(--surface2)', border:'1.5px solid var(--border)', borderRadius:'var(--r3)', padding:'9px 12px', fontFamily:'Barlow', fontSize:13, color:'var(--text)', outline:'none', marginBottom:6 }}
              value={p.part_number} onChange={e => updatePart(i, 'part_number', e.target.value)}
            />
            <input
              placeholder="Description *"
              style={{ width:'100%', background:'var(--surface2)', border:'1.5px solid var(--border)', borderRadius:'var(--r3)', padding:'9px 12px', fontFamily:'Barlow', fontSize:13, color:'var(--text)', outline:'none' }}
              value={p.description} onChange={e => updatePart(i, 'description', e.target.value)}
            />
          </div>
          <input
            type="number" min="0.1" step="0.1"
            style={{ width:56, background:'var(--surface2)', border:'1.5px solid var(--border)', borderRadius:'var(--r3)', padding:'9px 8px', fontFamily:'Barlow', fontSize:14, color:'var(--text)', outline:'none', textAlign:'center' }}
            value={p.quantity} onChange={e => updatePart(i, 'quantity', e.target.value)}
          />
          <button onClick={() => removePart(i)} style={{ background:'var(--surface2)', border:'1.5px solid var(--border)', borderRadius:'var(--r3)', width:38, height:38, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--danger)', cursor:'pointer', flexShrink:0, marginTop:0 }}>
            <Icon name="trash" size={15}/>
          </button>
        </div>
      ))}

      <div style={{ padding:'8px 16px 20px' }}>
        <button className="btn btn-primary" onClick={save} disabled={saving} style={{ opacity: saving ? .7 : 1 }}>
          {saving ? 'Saving...' : 'Save Log Entry'}
        </button>
      </div>
    </div>
  );
}

// ─── NEW CARD SCREEN ──────────────────────────────────────────────────────────
function NewCardScreen() {
  const { navigate, goBack } = useContext(NavCtx);
  const showToast = useContext(ToastCtx);
  const [step, setStep] = useState('customer');
  const [customerSearch, setCustomerSearch] = useState('');
  const [customers, setCustomers] = useState([]);
  const [customer, setCustomer] = useState(null);
  const [boat, setBoat] = useState(null);
  const [boats, setBoats] = useState([]);
  const [newCustomer, setNewCustomer] = useState({ name:'', phone:'', email:'', city:'' });
  const [newBoat, setNewBoat] = useState({ name:'', motor_type:'', model:'', licence:'', length_ft:'' });
  const [cardForm, setCardForm] = useState({ work_order_no:'', storage_type:'', wrap_required:false, remarks:'', other_work:'', date_in: new Date().toISOString().split('T')[0] });
  const [saving, setSaving] = useState(false);
  const [creatingCustomer, setCreatingCustomer] = useState(false);
  const [creatingBoat, setCreatingBoat] = useState(false);

  useEffect(() => {
    if (customerSearch.length >= 2) {
      api('GET', `/customers?q=${encodeURIComponent(customerSearch)}`).then(setCustomers).catch(() => {});
    } else {
      api('GET', '/customers').then(data => setCustomers(data.slice(0,20))).catch(() => {});
    }
  }, [customerSearch]);

  const selectCustomer = (c) => {
    setCustomer(c);
    api('GET', `/customers/${c.id}`).then(data => setBoats(data.boats || []));
    setStep('boat');
  };

  const createCustomer = async () => {
    if (!newCustomer.name) { showToast('Name required'); return; }
    setSaving(true);
    try {
      const c = await api('POST', '/customers', newCustomer);
      setCustomer({ ...newCustomer, id: c.id });
      setBoats([]);
      setStep('boat');
      setCreatingCustomer(false);
    } catch(e) { showToast('Failed to create customer'); }
    setSaving(false);

  const selectBoat = (b) => { setBoat(b); setStep('card'); };

  const createBoat = async () => {
    if (!newBoat.name && !newBoat.model) { showToast('Add boat name or model'); return; }
    setSaving(true);
    try {
      const b = await api('POST', '/boats', { ...newBoat, customer_id: customer.id });
      setBoat({ ...newBoat, id: b.id });
      setStep('card');
      setCreatingBoat(false);
    } catch(e) { showToast('Failed to create boat'); }
    setSaving(false);
  };

  const createCard = async () => {
    setSaving(true);
    try {

            </div>
            <span style={{ color:'var(--text3)', fontSize:18 }}>›</span>
          </div>

      </div>
      <div className="field">
        <label>Date In</label>
        <input type="date" value={cardForm.date_in} onChange={e => setCardForm({...cardForm, date_in: e.target.value})}/>
      </div>

      <div style={{ padding:'0 16px 12px' }}>
        <label style={{ fontFamily:'Barlow Condensed', fontSize:12, fontWeight:700, letterSpacing:.8, color:'var(--text2)', textTransform:'uppercase', display:'block', marginBottom:8 }}>Storage Type</label>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
          {STORAGE_TYPES.map(st => (
            <button key={st.key} className={`chip ${cardForm.storage_type === st.key ? 'on' : ''}`} onClick={() => setCardForm({...cardForm, storage_type: cardForm.storage_type === st.key ? '' : st.key})}>
              {st.icon} {st.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ padding:'0 16px 12px' }}>
        <button className={`chip ${cardForm.wrap_required ? 'on warn' : ''}`} onClick={() => setCardForm({...cardForm, wrap_required: !cardForm.wrap_required})}>
          🎁 Shrink Wrap Required
        </button>
      </div>

      <div className="field">
        <label>Other Work / Notes</label>
        <textarea placeholder="Trim not working, algae strip + wax..." value={cardForm.other_work} onChange={e => setCardForm({...cardForm, other_work: e.target.value})}/>
      </div>

      <div className="field">
        <label>Remarks</label>
        <textarea placeholder="Winter storage 2025-2026..." value={cardForm.remarks} onChange={e => setCardForm({...cardForm, remarks: e.target.value})}/>
      </div>

      <div style={{ padding:'4px 16px 24px' }}>
        <button className="btn btn-primary" onClick={createCard} disabled={saving} style={{ opacity: saving ? .7 : 1 }}>
          {saving ? 'Creating...' : '⚓ Create Service Card'}
        </button>
      </div>
    </div>
  );
}

// ─── ADMIN SCREEN ─────────────────────────────────────────────────────────────
function AdminScreen() {
  const showToast = useContext(ToastCtx);
  const [employees, setEmployees] = useState([]);
  const [showNew, setShowNew] = useState(false);
  const [newEmp, setNewEmp] = useState({ name:'', role:'mechanic', initials:'', pin:'' });
  const [saving, setSaving] = useState(false);

  const reload = () => api('GET', '/employees').then(setEmployees).catch(() => {});
  useEffect(() => { reload(); }, []);

  const createEmployee = async () => {
    if (!newEmp.name || !newEmp.pin) { showToast('Name and PIN required'); return; }
    if (!/^\d{4}$/.test(newEmp.pin)) { showToast('PIN must be 4 digits'); return; }
    setSaving(true);
    try {
      await api('POST', '/employees', newEmp);
      showToast('Employee created');
      setNewEmp({ name:'', role:'mechanic', initials:'', pin:'' });
      setShowNew(false);
      reload();
    } catch(e) { showToast(e.message || 'Failed'); }
    setSaving(false);
  };

  const toggleActive = async (emp) => {
    const confirmed = confirm(`${emp.active ? 'Deactivate' : 'Activate'} ${emp.name}? ${emp.active ? 'This will revoke all device tokens.' : ''}`);
    if (!confirmed) return;
    try {
      await api('PUT', `/employees/${emp.id}`, { active: !emp.active });
      showToast(emp.active ? 'Employee deactivated — PIN revoked' : 'Employee reactivated');
      reload();
    } catch(e) { showToast('Failed'); }
  };

  return (
    <div>
      <div style={{ padding:'10px 12px 8px', display:'flex', justifyContent:'flex-end' }}>
        <button className="btn btn-accent btn-sm" style={{ width:'auto' }} onClick={() => setShowNew(!showNew)}>
          {showNew ? '✕ Cancel' : '+ Add Employee'}
        </button>
      </div>

      {showNew && (
        <div className="card" style={{ margin:'0 12px 12px' }}>
          <div style={{ padding:'14px 16px' }}>
            {[['Full Name *','name','text'],['Initials (2-3)','initials','text'],['4-Digit PIN *','pin','number']].map(([l, k, t]) => (
              <div key={k} style={{ marginBottom:12 }}>
                <label style={{ fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:.8, color:'var(--text2)', textTransform:'uppercase', display:'block', marginBottom:4 }}>{l}</label>
                <input type={t} maxLength={k === 'pin' ? 4 : k === 'initials' ? 3 : undefined}
                  style={{ width:'100%', background:'var(--surface2)', border:'1.5px solid var(--border)', borderRadius:'var(--r3)', padding:'9px 12px', fontFamily:'Barlow', fontSize:14, color:'var(--text)', outline:'none' }}
                  value={newEmp[k]} onChange={e => setNewEmp({...newEmp, [k]: e.target.value})}/>
              </div>
            ))}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontFamily:'Barlow Condensed', fontSize:11, fontWeight:700, letterSpacing:.8, color:'var(--text2)', textTransform:'uppercase', display:'block', marginBottom:6 }}>Role</label>
              <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                {['admin','office','mechanic','wrapper'].map(r => (
                  <button key={r} className={`chip ${newEmp.role === r ? 'on' : ''}`} style={{ textTransform:'capitalize' }} onClick={() => setNewEmp({...newEmp, role: r})}>
                    {r}
                  </button>
                ))}
              </div>
            </div>
            <button className="btn btn-primary" onClick={createEmployee} disabled={saving}>{saving ? 'Creating...' : 'Create Employee'}</button>
          </div>
        </div>
      )}

      <div className="card" style={{ margin:'0 12px' }}>
        {employees.map((emp, i) => (
          <div key={emp.id} className="emp-card" style={{ borderBottom: i < employees.length-1 ? '1px solid var(--border)' : 'none' }}>
            <div className="emp-avatar" style={{ background: emp.active ? (ROLE_COLORS[emp.role] || 'var(--accent)') : 'var(--text3)', color:'#fff' }}>
              {emp.initials || emp.name.slice(0,2).toUpperCase()}
            </div>
            <div className="emp-info">
              <div className="emp-name" style={{ color: emp.active ? 'var(--text)' : 'var(--text3)' }}>{emp.name}</div>
              <div className="emp-role" style={{ color: emp.active ? ROLE_COLORS[emp.role] : 'var(--text3)' }}>{emp.role}</div>
            </div>
            <button
              onClick={() => toggleActive(emp)}
              className={`chip btn-sm ${emp.active ? 'on danger' : ''}`}
              style={{ textTransform:'uppercase', width:'auto', fontSize:11 }}
            >
              {emp.active ? 'ACTIVE' : 'INACTIVE'}
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── APP SHELL ────────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { key:'dashboard', label:'Home',   icon:'home'     },
  { key:'cards',     label:'Cards',  icon:'list'     },
  { key:'_fab',      label:'',       icon:'plus'     },
  { key:'map',       label:'Map',    icon:'map'      },
  { key:'settings',  label:'Setup',  icon:'settings' },
];

function AppShell() {
  const { employee, logout } = useContext(AuthCtx);
  const [screenStack, setScreenStack] = useState([{ screen:'dashboard', params:{} }]);
  const current = screenStack[screenStack.length - 1];
  const canGoBack = screenStack.length > 1;

  const navigate = useCallback((screen, params={}) => {
    setScreenStack(prev => [...prev, { screen, params }]);
  }, []);

  const goBack = useCallback(() => {
    setScreenStack(prev => prev.length > 1 ? prev.slice(0,-1) : prev);
  }, []);

  const SCREEN_TITLES = {
    dashboard: { title:'Marina Repair', sub: null },
    cards:     { title:'Service Cards', sub: null },
    card:      { title:'Service Card',  sub: null },
    'new-card':{ title:'New Card',      sub: null },
    'new-log': { title:'Add Work Entry',sub: p => p.cardName },
    map:       { title:'Storage Map',   sub: null },
    settings:  { title:'Settings',      sub: null },
    admin:     { title:'Manage Employees', sub: null },
  };

  const headerCfg = SCREEN_TITLES[current.screen] || { title: current.screen, sub: null };
  const subTitle = typeof headerCfg.sub === 'function' ? headerCfg.sub(current.params) : headerCfg.sub;

  const activeNav = ['map','settings','dashboard','cards'].includes(current.screen) ? current.screen : '';

  const renderScreen = () => {
    switch(current.screen) {
      case 'dashboard': return <DashboardScreen/>;
      case 'cards':     return <CardsScreen params={current.params}/>;
      case 'card':      return <CardDetailScreen params={current.params}/>;
      case 'new-card':  return <NewCardScreen/>;
      case 'new-log':   return <NewLogScreen params={current.params}/>;
      case 'map':       return <MapScreen/>;
      case 'settings':  return <SettingsScreen/>;
      case 'admin':     return <AdminScreen/>;
      default:          return <DashboardScreen/>;
    }
  };

  return (
    <NavCtx.Provider value={{ navigate, goBack }}>
      <div className="app-shell">
        <div className="header">
          {canGoBack ? (
            <button className="header-btn" onClick={goBack}>
              <Icon name="back" size={20} color="#fff"/>
            </button>
          ) : (
            <div style={{ marginLeft:4, color:'rgba(255,255,255,.8)', fontSize:20 }}>⚓</div>
          )}
          <div style={{ flex:1, minWidth:0 }}>
            <div className="header-title">{headerCfg.title}</div>
            {subTitle && <div className="header-sub">{subTitle}</div>}
          </div>
          <div style={{ fontFamily:'Bebas Neue', fontSize:14, letterSpacing:1, color:'rgba(255,255,255,.6)' }}>
            {employee?.initials}
          </div>
        </div>

        <div className="screen-body">
          {renderScreen()}
        </div>

        <div className="bottom-nav">
          {NAV_ITEMS.map(item => {
            if (item.key === '_fab') return (
              <div key="_fab" style={{ flex:1, position:'relative' }}>
                <button className="nav-fab" onClick={() => navigate('new-card')}>
                  <Icon name="plus" size={26} color="#fff"/>
                </button>
              </div>
            );
            return (
              <button
                key={item.key}
                className={`nav-item ${activeNav === item.key ? 'active' : ''}`}
                onClick={() => setScreenStack([{ screen: item.key, params:{} }])}
              >
                <Icon name={item.icon} size={22}/>
                {item.label}
              </button>
            );
          })}
        </div>
      </div>
    </NavCtx.Provider>
  );
}

// ─── THEME PROVIDER ───────────────────────────────────────────────────────────
function ThemeProvider({ children }) {
  const [theme, setTheme] = useState(() => localStorage.getItem('marina_theme') || 'deep-water');
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem('marina_dark') === 'true');

  useEffect(() => {
    localStorage.setItem('marina_theme', theme);
    localStorage.setItem('marina_dark', darkMode);
    const body = document.body;
    // Remove all theme classes
    THEMES.forEach(t => body.classList.remove(`theme-${t.id}`, 'light', 'dark'));
    body.classList.add(`theme-${theme}`);
    body.classList.add(darkMode ? 'dark' : 'light');
    // Meta theme-color
    const mc = document.querySelector('meta[name="theme-color"]');
    if (mc) {
      const colors = THEME_PREVIEW_COLORS[theme][darkMode ? 'night' : 'day'];
      mc.content = colors[0];
    }
  }, [theme, darkMode]);

  return (
    <ThemeCtx.Provider value={{ theme, darkMode, setTheme, setDarkMode }}>
      {children}
    </ThemeCtx.Provider>
  );
}

// ─── AUTH PROVIDER ────────────────────────────────────────────────────────────
function AuthProvider({ children }) {
  const [employee, setEmployee] = useState(() => {
    try { return JSON.parse(localStorage.getItem('marina_employee')); } catch { return null; }
  });

  const login = (emp) => {
    setEmployee(emp);
    localStorage.setItem('marina_employee', JSON.stringify(emp));
  };

  const logout = async () => {
    try { await api('POST', '/auth/logout'); } catch {}
    localStorage.removeItem('marina_token');
    localStorage.removeItem('marina_employee');
    setEmployee(null);
  };

  return (
    <AuthCtx.Provider value={{ employee, login, logout }}>
      {children}
    </AuthCtx.Provider>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const { employee, login } = useContext(AuthCtx);

  // Verify token on mount
  useEffect(() => {
    if (employee && getToken()) {
      api('GET', '/auth/me').then(emp => {
        if (emp) login(emp);
      }).catch(() => {
        localStorage.removeItem('marina_token');
        localStorage.removeItem('marina_employee');
      });
    }
  }, []);

  if (!employee) return <LoginScreen onLogin={login}/>;
  return <AppShell/>;
}

function Root() {
  return (
    <ThemeProvider>
      <AuthProvider>
        <ToastProvider>
          <App/>
        </ToastProvider>
      </AuthProvider>
    </ThemeProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
